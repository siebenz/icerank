name: Update NHL Data

on:

  schedule:

    - cron: "0 */6 * * *"

  workflow_dispatch:


jobs:

  update:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Install Node
      uses: actions/setup-node@v4

      with:

        node-version: 22


    - name: Update Data

      run: |

        node updater/fetch.js
        node updater/generate.js


    - name: Save Changes

      run: |

        git config --global user.name "IceRank Bot"

        git config --global user.email "bot@icerank"

        git add .

        git commit -m "Updated NHL stats" || exit 0

        git push
